<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="cadastro.css">

</head>

<body>
  <h1>Cadastro</h1>

  <nav class="navbar">
    <img src="/EcoValidade/logo.png" alt="" class="logo">
    <ul class="navlinks">
      <li><a href="../landingPage/index.html">Início</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="senha.html">Recuperar senha</a></li>
  </nav>


  <form>
    <h2>Empresa</h2>
    <div class="row">
      <div class="field">
        <label>Nome da Empresa</label>
        <input type="text" placeholder="Nome comercial">
      </div>
      <div class="field">
        <label>CNPJ</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18">
      </div>
    </div>

    <h2>Endereço</h2>
    <div class="row" style="margin-bottom:12px">
      <div class="field">
        <label>CEP</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9">
      </div>
      <div class="field">
        <label>Número</label>
        <input type="text" placeholder="Nº">
      </div>
    </div>
    <div class="row" style="margin-bottom:12px">
      <div class="field full">
        <label>Rua</label>
        <input type="text" id="rua" placeholder="Rua / Avenida">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Bairro</label>
        <input type="text" id="bairro">
      </div>
      <div class="field">
        <label>Cidade</label>
        <input type="text" id="cidade">
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="field">
        <label>Estado</label>
        <select id="estado">
          <option value="" disabled selected>Selecione</option>
          <option>AC</option>
          <option>AL</option>
          <option>AM</option>
          <option>AP</option>
          <option>BA</option>
          <option>CE</option>
          <option>DF</option>
          <option>ES</option>
          <option>GO</option>
          <option>MA</option>
          <option>MG</option>
          <option>MS</option>
          <option>MT</option>
          <option>PA</option>
          <option>PB</option>
          <option>PE</option>
          <option>PI</option>
          <option>PR</option>
          <option>RJ</option>
          <option>RN</option>
          <option>RO</option>
          <option>RR</option>
          <option>RS</option>
          <option>SC</option>
          <option>SE</option>
          <option>SP</option>
          <option>TO</option>
        </select>
      </div>
    </div>

    <h2>Contato</h2>
    <div class="row">
      <div class="field">
        <label>Telefone</label>
        <input type="text" id="tel" placeholder="(00) 00000-0000" maxlength="15">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" placeholder="">
      </div>
    </div>

    <h2>Responsavel</h2>
    <div class="row" style="margin-bottom:12px">
      <div class="field full">
        <label>Nome</label>
        <input type="text" placeholder="Nome completo">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input type="text" id="tel2" placeholder="(00) 00000-0000" maxlength="15">
      </div>
    </div>

    <h2>Acesso</h2>
    <div class="row">
      <div class="field">
        <label>E-mail de login</label>
        <input type="email" placeholder="">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" placeholder="Minimo 8 caracteres">
      </div>
    </div>

    <div class="actions">
      <button type="button"class="secundary" >Cancelar</button>
      <button type="submit" class="primary">Salvar</button>
    </div>
  </form>
  <div class="links">
    <a href="login.html" class="login">
      Login </a>
    <a href="senha.html" class="senha">Esqueci minha senha</a>
  </div>
  <script src="cadastro.js"></script>

</body>

</html>
